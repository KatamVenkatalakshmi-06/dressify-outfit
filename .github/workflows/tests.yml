name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install backend dependencies
        run: cd backend && npm install
      
      - name: Lint backend
        run: cd backend && npm run lint --if-present
        continue-on-error: true
      
      - name: Run backend tests
        run: cd backend && npm test --if-present
        continue-on-error: true
        env:
          MONGODB_URI: mongodb://localhost:27017/dressify-test
          JWT_SECRET: test_secret_key
          NODE_ENV: test

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install frontend dependencies
        run: npm install
      
      - name: Lint frontend
        run: npm run lint
        continue-on-error: true
      
      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api

  build-frontend:
    needs: test-frontend
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Build frontend
        run: |
          npm install
          npm run build
      
      - name: Archive build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  deploy-checks:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Check for required files
        run: |
          [ -f backend/.env.example ] && echo "✓ backend/.env.example found"
          [ -f vercel.json ] && echo "✓ vercel.json found"
          [ -f render.yaml ] && echo "✓ render.yaml found"
          [ -f CLOUD_DEPLOYMENT_GUIDE.md ] && echo "✓ CLOUD_DEPLOYMENT_GUIDE.md found"
      
      - name: Verify package.json
        run: |
          node -e "const pkg = require('./package.json'); console.log('✓ Frontend package.json valid')"
          node -e "const pkg = require('./backend/package.json'); console.log('✓ Backend package.json valid')"
      
      - name: Success
        run: echo "✓ All checks passed! Ready for deployment"
